<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Tracker | HEED OT System</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="HEED OT" />
  <link rel="icon" type="image/png" href="HEED_DEV-logo.png" />
  <link rel="apple-touch-icon" href="HEED_DEV-logo.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page system-page">
    <aside class="panel sidebar">
      <div class="brand-block">
        <img src="HEED_DEV-logo.png" alt="HEED logo" class="brand-logo" />
        <h1>HEED OT System</h1>
        <p>Record and review received payments.</p>
      </div>
      <nav class="side-nav">
        <a href="index.html" class="nav-link">Dashboard</a>
<a href="clients.html" class="nav-link">Clients</a>
<a href="sessions.html" class="nav-link">Sessions</a>
<a href="invoices.html" class="nav-link">Invoices</a>
<a href="receipt.html" class="nav-link">Receipts</a>
<a href="payments.html" class="nav-link active">Payment Tracker</a>
      </nav>
    </aside>
    <main class="panel main-panel">
      
<section class="section-header">
  <h2>Payment Tracker</h2>
  <p>Track invoice payments and balances.</p>
</section>

<section class="content-grid">
  <div class="panel inner-panel">
    <h3>Add Payment</h3>
    <div class="field"><label>Invoice</label><select id="paymentInvoice"></select></div>
    <div class="two-col">
      <div class="field"><label>Payment Date</label><input id="paymentDate" type="date" /></div>
      <div class="field"><label>Amount (RM)</label><input id="paymentAmount" type="number" min="0" step="0.01" /></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Method</label>
        <select id="paymentMethod">
          <option value="Bank Transfer">Bank Transfer</option>
          <option value="Cash">Cash</option>
          <option value="DuitNow">DuitNow</option>
          <option value="Cheque">Cheque</option>
        </select>
      </div>
      <div class="field"><label>Reference</label><input id="paymentReference" type="text" /></div>
    </div>
    <button class="primary full-btn" id="savePaymentBtn">Save Payment</button>
  </div>

  <div class="panel inner-panel">
    <div class="list-header">
      <h3>Payment List</h3>
    </div>
    <div id="paymentList" class="card-list"></div>
  </div>
</section>

    </main>
  </div>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/payments.js"></script>
</body>
</html>
